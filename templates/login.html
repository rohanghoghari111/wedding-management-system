<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Advanced Login - Wedding Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='responsive.css') }}">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0a1e;
  overflow:hidden;
  position:relative;
}

/* Background */
.bg-circle{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.6;
  animation:float 20s ease-in-out infinite;
}
.circle1{width:400px;height:400px;background:#ff6b81;top:-150px;left:-150px;}
.circle2{width:500px;height:500px;background:#6a82fb;bottom:-200px;right:-200px;}

@keyframes float{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(80px,60px);}
}

/* ================= BIGGER Login Box ================= */
.login-container{
  position:relative;
  z-index:2;
  width:520px;              /* 🔥 size increased */
  padding:70px 60px;        /* 🔥 more spacing */
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
  text-align:center;
}

.login-container h2{
  color:#fff;
  margin-bottom:40px;
  font-weight:700;
  font-size:28px;           /* 🔥 bigger title */
}

/* Input */
.input-group{
  position:relative;
  margin-bottom:30px;
}

.input-group input{
  width:100%;
  padding:18px;             /* 🔥 bigger input */
  border-radius:14px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
  font-size:16px;           /* 🔥 bigger text */
  transition:0.3s;
}

.input-group input:focus{
  background:rgba(255,255,255,0.25);
  box-shadow:0 0 25px #ff6b81;
}

.input-group label{
  position:absolute;
  top:50%;
  left:18px;
  transform:translateY(-50%);
  color:#ddd;
  font-size:15px;
  transition:0.3s;
  pointer-events:none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
  top:-10px;
  font-size:13px;
  color:#ff6b81;
}

/* Button */
button{
  width:100%;
  padding:18px;            /* 🔥 bigger button */
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff6b81,#ff4757);
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 40px rgba(255,107,129,0.6);
}

/* Flash */
.flash{
  padding:12px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:14px;
}
.flash.success{background:#28a745;}
.flash.warning{background:#ffc107;color:#000;}
.flash.info{background:#17a2b8;}

@media(max-width:600px){
  .login-container{
    width:90%;
    padding:50px 30px;
  }
}
</style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="login-container">
  <h2>Login</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category,message in messages %}
        <div class="flash {{category}}">{{message}}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

<form method="POST" autocomplete="off">

  <div class="input-group">
    <input type="text"
           name="username"
           placeholder=" "
           required
           autocomplete="new-username">
    <label>Username</label>
  </div>

  <div class="input-group">
    <input type="password"
           name="password"
           placeholder=" "
           required
           autocomplete="new-password">
    <label>Password</label>
  </div>

  <button type="submit">Login</button>

</form>
</div>

</body>
</html>
